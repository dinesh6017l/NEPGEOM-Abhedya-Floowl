<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapbox GL App</title>
    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- The UI Box on top/side of the map -->
        <div id="ui-box">
            <div class="mode-selector">
                <span class="mode-label">User Mode:</span>
                <button id="mode-simple-btn" class="mode-btn active">Simple</button>
                <button id="mode-complex-btn" class="mode-btn">Complex</button>
            </div>
            <hr>
            <div id="simple-mode-content">
                <h2>Location Manager</h2>
                <div class="form-group">
                    <input type="text" id="loc-name" placeholder="Location Name">
                    <input type="number" id="loc-lng" placeholder="Longitude" step="any">
                    <input type="number" id="loc-lat" placeholder="Latitude" step="any">
                    <button id="add-btn">Add Location</button>
                    <button id="select-region-btn" type="button">Select Region</button>
                </div>
                <hr>
                <h3>Saved Locations (Database)</h3>
                <ul id="location-list"></ul>
                <h3>Saved Regions (Database)</h3>
                <ul id="region-list"></ul>
                <p class="region-hint" id="region-hint">Region mode: click two corners on the map.</p>
                <p><button id="export-tif-btn" style="display:none; font-size:0.85rem; padding:6px 10px; margin-top:8px;">Export TIF</button> <button id="simulate-btn" style="display:none; font-size:0.85rem; padding:6px 10px; margin-top:8px;">Run Simulation</button></p>
                <p class="export-status" id="export-status"></p>
                <p class="token-warning" id="token-warning">Please enter your Mapbox Token in api/config.json!</p>
            </div>
            <div id="complex-mode-content" style="display:none;">
                <h2>Advanced Simulation</h2>
                <p>Complex mode parameters will appear here in the new branch.</p>
            </div>
        </div>
        
        <!-- The Mapbox GL Map Container -->
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
